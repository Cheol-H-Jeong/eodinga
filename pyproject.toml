[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "eodinga"
version = "0.1.0"
description = "Instant lexical file search"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "loguru",
  "pydantic>=2",
  "watchdog",
  "pathspec",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "ruff",
  "pyright",
]
parsers = []
gui = []

[tool.setuptools]
packages = ["eodinga", "eodinga.core", "eodinga.index"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "PTH"]

[tool.pyright]
include = ["eodinga", "tests"]
pythonVersion = "3.11"
typeCheckingMode = "standard"
