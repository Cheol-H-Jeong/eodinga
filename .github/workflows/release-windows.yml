---
name: release-windows

"on":
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .[dev,parsers,gui,packaging]
      - name: Validate packaging inputs
        run: python packaging/build.py --target windows-dry-run
      - name: Build
        run: python packaging/build.py --target windows
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eodinga-windows
          path: packaging/dist/*
