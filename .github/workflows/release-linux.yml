---
name: release-linux

"on":
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .[dev,parsers,gui]
      - name: Build AppImage dry run
        run: python packaging/build.py --target linux-appimage-dry-run
      - name: Build Debian dry run
        run: python packaging/build.py --target linux-deb-dry-run
      - name: Package AppImage
        run: bash packaging/linux/appimage.sh
      - name: Package Debian
        run: bash packaging/linux/deb.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eodinga-linux
          path: packaging/dist/*
